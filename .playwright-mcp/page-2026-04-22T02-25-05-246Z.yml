        - generic [ref=e206]: 由啟程的時候起計算，或由指定的時間及地點以供租用人使用的時候起計算。
      - generic [ref=e207]:
        - generic [ref=e208]: 咪錶顯示規格
        - generic [ref=e209]: 錶面須顯示法定最低收費及遞增附加費；車費與附加費數字高度不少於 10 毫米。
      - generic [ref=e210]:
        - generic [ref=e211]: 車內須展示收費表
        - generic [ref=e212]: 的士可供出租期間，須讓乘客清楚看到中英對照收費表；設計、構造及位置須符合署長規定。
      - generic [ref=e213]:
        - generic [ref=e214]: 輔幣規定（最低數值）
        - generic [ref=e215]: 司機須備 $10 面額鈔票或 $2 或以上面額硬幣達 $90；$1 或以下面額硬幣達 $10。
      - generic [ref=e216]:
        - generic [ref=e217]: 電子支付（2026/4/1 起）
        - generic [ref=e218]: 必須容許透過至少一種二維碼電子繳費媒介及至少一種非二維碼電子繳費媒介繳付車費。
      - generic [ref=e219]:
        - generic [ref=e220]: 過海的士站候客司機
        - generic [ref=e221]: 在過海的士站候客之司機，可拒絕接載非經由海底隧道、東隧或西隧而到達目的地之乘客。
      - generic [ref=e222]:
        - generic [ref=e223]: 運載貨物限制
        - generic [ref=e224]: 的士不得運載個人手提行李以外的貨物；不得接載危險或厭惡性質、或未經牢固包裝之貨物。
      - generic [ref=e225]:
        - generic [ref=e226]: 車費收據格式
        - generic [ref=e227]: 收據須符合署長指明格式（附錄甲），列明車號、上落車時間、總公里、收費公里及分鐘、附加費、總車費；若打印設備故障，須以附錄乙樣本手寫。
      - generic [ref=e228]:
        - generic [ref=e229]: 乘客不繫安全帶
        - generic [ref=e230]: 乘客如拒絕或沒有佩帶安全帶，司機可拒絕租賃或駕駛；乘客須下車並支付咪錶已錄之法定車資。
      - generic [ref=e231]:
        - generic [ref=e232]: 車隊的士自訂車費
        - generic [ref=e233]: 車隊持牌人可就預約行程自訂車費（咪錶車費外加預約費，或行程前協定整筆車費）；街頭截乘仍須按法定收費表。
